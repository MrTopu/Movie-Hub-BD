<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies Hub BD | Download Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #080808; color: white; }
        .red-gradient { background: linear-gradient(135deg, #ff0000 0%, #880000 100%); }
        .glass { background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(10px); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 bg-black/90 border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <span class="text-2xl font-black cursor-pointer" onclick="showHome()">
            MOVIES <span class="text-red-600">HUB</span> <span class="bg-red-600 px-1 rounded text-white">BD</span>
        </span>
        <div class="flex items-center bg-white/5 border border-white/10 rounded-full px-4 py-1.5">
            <input type="text" placeholder="Search..." class="bg-transparent outline-none text-sm w-32 md:w-48">
            <i data-lucide="search" class="w-4 h-4 text-gray-400"></i>
        </div>
    </nav>

    <main id="homePage" class="max-w-7xl mx-auto px-6 pt-28 pb-20">
        <div class="flex space-x-4 mb-10 overflow-x-auto pb-2">
            <button class="bg-red-600 px-6 py-2 rounded-full text-sm font-bold">All</button>
            <button class="bg-white/5 px-6 py-2 rounded-full text-sm font-bold hover:bg-red-600 transition">Bengali</button>
            <button class="bg-white/5 px-6 py-2 rounded-full text-sm font-bold hover:bg-red-600 transition">Hollywood</button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <div class="cursor-pointer group" onclick="openDetails('Aranyer Chhaya', 'https://images.unsplash.com/photo-1594908941016-22447a91bb24?w=800', '2026', 'Horror/Thriller', 'A terrifying folk-horror story set in the deep forests of the Sundarbans. Follow a group of travelers as they encounter the mysterious Shadow Man.', '480p (400MB)', '720p (900MB)', '1080p (2.1GB)')">
                <div class="relative overflow-hidden rounded-2xl aspect-[2/3]">
                    <img src="https://images.unsplash.com/photo-1594908941016-22447a91bb24?w=500" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                        <i data-lucide="info" class="w-12 h-12 text-white"></i>
                    </div>
                </div>
                <h4 class="mt-3 font-bold">Aranyer Chhaya</h4>
                <p class="text-xs text-gray-500">2026 • Bengali</p>
            </div>

            <div class="cursor-pointer group" onclick="openDetails('The Proxima Signal', 'https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?w=800', '2026', 'Sci-Fi', 'An epic space exploration mission to Proxima Centauri set in the year 2080. Classic sci-fi style with breathtaking visuals.', '720p (1.2GB)', '1080p (2.5GB)', '4K (8GB)')">
                <div class="relative overflow-hidden rounded-2xl aspect-[2/3]">
                    <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?w=500" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                        <i data-lucide="info" class="w-12 h-12 text-white"></i>
                    </div>
                </div>
                <h4 class="mt-3 font-bold">The Proxima Signal</h4>
                <p class="text-xs text-gray-500">2026 • English</p>
            </div>
        </div>
    </main>

    <main id="detailPage" class="hidden min-h-screen pt-28 px-6 pb-20">
        <div class="max-w-6xl mx-auto">
            <button onclick="showHome()" class="flex items-center text-red-500 font-bold mb-8 hover:text-white transition">
                <i data-lucide="arrow-left" class="mr-2"></i> Back to Home
            </button>

            <div class="grid md:grid-cols-3 gap-10">
                <div class="rounded-3xl overflow-hidden shadow-2xl shadow-red-900/20">
                    <img id="detPoster" src="" class="w-full object-cover">
                </div>

                <div class="md:col-span-2 space-y-6">
                    <h1 id="detTitle" class="text-4xl md:text-6xl font-black uppercase"></h1>
                    <div class="flex items-center space-x-4 text-gray-400">
                        <span id="detYear" class="bg-white/10 px-3 py-1 rounded text-sm"></span>
                        <span id="detGenre" class="text-red-500 font-bold tracking-widest text-sm uppercase"></span>
                    </div>
                    <p id="detDesc" class="text-gray-300 text-lg leading-relaxed"></p>

                    <hr class="border-white/10">

                    <div class="space-y-4">
                        <h3 class="text-xl font-bold flex items-center">
                            <i data-lucide="download" class="mr-2 text-red-600"></i> Download Links
                        </h3>
                        <div class="grid gap-3">
                            <a href="#" class="flex justify-between items-center bg-white/5 p-4 rounded-xl hover:bg-red-600 transition group">
                                <span>Download in <strong id="link1"></strong></span>
                                <i data-lucide="external-link" class="w-4 h-4 opacity-50 group-hover:opacity-100"></i>
                            </a>
                            <a href="#" class="flex justify-between items-center bg-white/5 p-4 rounded-xl hover:bg-red-600 transition group">
                                <span>Download in <strong id="link2"></strong></span>
                                <i data-lucide="external-link" class="w-4 h-4 opacity-50 group-hover:opacity-100"></i>
                            </a>
                            <a href="#" class="flex justify-between items-center bg-white/5 p-4 rounded-xl hover:bg-red-600 transition group">
                                <span>Download in <strong id="link3"></strong></span>
                                <i data-lucide="external-link" class="w-4 h-4 opacity-50 group-hover:opacity-100"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function openDetails(title, img, year, genre, desc, l1, l2, l3) {
            // Hide Home, Show Details
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('detailPage').classList.remove('hidden');
            window.scrollTo(0, 0);

            // Set Data
            document.getElementById('detTitle').innerText = title;
            document.getElementById('detPoster').src = img;
            document.getElementById('detYear').innerText = year;
            document.getElementById('detGenre').innerText = genre;
            document.getElementById('detDesc').innerText = desc;
            document.getElementById('link1').innerText = l1;
            document.getElementById('link2').innerText = l2;
            document.getElementById('link3').innerText = l3;
        }

        function showHome() {
            document.getElementById('homePage').classList.remove('hidden');
            document.getElementById('detailPage').classList.add('hidden');
        }
    </script>
</body>
</html>
