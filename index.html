<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream | Modern Movie UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .movie-card:hover .info-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .hero-gradient {
            background: linear-gradient(to top, #050505, transparent);
        }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 glass px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-bold tracking-tighter text-red-600">CINE<span class="text-white">STREAM</span></div>
        <div class="hidden md:flex space-x-8 text-sm font-medium text-gray-300">
            <a href="#" class="hover:text-white transition">Home</a>
            <a href="#" class="hover:text-white transition">Movies</a>
            <a href="#" class="hover:text-white transition">TV Shows</a>
            <a href="#" class="hover:text-white transition">My List</a>
        </div>
        <div class="flex items-center space-x-5">
            <i data-lucide="search" class="w-5 h-5 cursor-pointer"></i>
            <i data-lucide="bell" class="w-5 h-5 cursor-pointer"></i>
            <div class="w-8 h-8 bg-gradient-to-tr from-red-600 to-orange-400 rounded-md"></div>
        </div>
    </nav>

    <section class="relative h-[80vh] w-full overflow-hidden">
        <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?auto=format&fit=crop&q=80&w=2070" 
             class="absolute inset-0 w-full h-full object-cover" alt="Hero Background">
        <div class="absolute inset-0 hero-gradient"></div>
        
        <div class="absolute bottom-20 left-10 max-w-2xl space-y-4">
            <span class="px-3 py-1 bg-red-600 text-xs font-bold rounded uppercase tracking-widest">Trending Now</span>
            <h1 class="text-6xl font-bold leading-tight">Interstellar Voyage</h1>
            <p class="text-gray-300 text-lg">A crew of astronauts travel through a wormhole in space in an attempt to ensure humanity's survival.</p>
            <div class="flex space-x-4 pt-4">
                <button class="bg-white text-black px-8 py-3 rounded-lg font-bold flex items-center hover:bg-gray-200 transition">
                    <i data-lucide="play" class="w-5 h-5 mr-2 fill-black"></i> Play
                </button>
                <button class="glass px-8 py-3 rounded-lg font-bold flex items-center hover:bg-white/20 transition">
                    <i data-lucide="info" class="w-5 h-5 mr-2"></i> More Info
                </button>
            </div>
        </div>
    </section>

    <main class="px-10 -mt-10 relative z-10 space-y-12 pb-20">
        
        <section>
            <h2 class="text-xl font-semibold mb-6 flex items-center">
                Popular on CineStream <i data-lucide="chevron-right" class="ml-2 w-5 h-5 text-gray-500"></i>
            </h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                
                <div class="movie-card relative group cursor-pointer overflow-hidden rounded-xl transition-transform duration-300 hover:scale-105">
                    <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&q=80&w=500" class="w-full aspect-[2/3] object-cover" alt="Movie">
                    <div class="info-overlay absolute inset-0 bg-black/80 opacity-0 flex flex-col justify-end p-4 transition-opacity duration-300 transform translate-y-2">
                        <h3 class="font-bold text-sm">The Midnight Sky</h3>
                        <div class="flex items-center text-[10px] text-gray-400 mt-1 space-x-2">
                            <span class="text-green-400 font-bold">98% Match</span>
                            <span>2024</span>
                            <span class="border border-gray-600 px-1 rounded">HD</span>
                        </div>
                    </div>
                </div>

                <div class="movie-card relative group cursor-pointer overflow-hidden rounded-xl transition-transform duration-300 hover:scale-105">
                    <img src="https://images.unsplash.com/photo-1440404653325-ab127d49abc1?auto=format&fit=crop&q=80&w=500" class="w-full aspect-[2/3] object-cover" alt="Movie">
                    <div class="info-overlay absolute inset-0 bg-black/80 opacity-0 flex flex-col justify-end p-4 transition-opacity duration-300">
                        <h3 class="font-bold text-sm">Retro Noir</h3>
                        <div class="flex items-center text-[10px] text-gray-400 mt-1 space-x-2">
                            <span class="text-green-400 font-bold">85% Match</span>
                            <span>2025</span>
                            <span class="border border-gray-600 px-1 rounded">4K</span>
                        </div>
                    </div>
                </div>

                <div class="movie-card relative overflow-hidden rounded-xl bg-gray-900 animate-pulse w-full aspect-[2/3]"></div>
                <div class="movie-card relative overflow-hidden rounded-xl bg-gray-900 animate-pulse w-full aspect-[2/3]"></div>
                <div class="movie-card relative overflow-hidden rounded-xl bg-gray-900 animate-pulse w-full aspect-[2/3]"></div>
                <div class="movie-card relative overflow-hidden rounded-xl bg-gray-900 animate-pulse w-full aspect-[2/3]"></div>

            </div>
        </section>

    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
</html>
